<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 18" width="18" height="18">
  <!--
    SmoothPeek Status Bar Icon — Template image (monochrome, black)
    macOS renders template images adaptively for dark/light menu bar.
    Design: Three stacked window thumbnails emerging upward from a base bar,
    with a subtle peek/pop motion implied by the center card being elevated.
    Stroke weight: 1.2px at 18px = crisp at @1x and @2x Retina.
  -->

  <!-- Base bar (represents the Dock) -->
  <rect x="1" y="14.5" width="16" height="2.5" rx="1.25"
        fill="black"/>

  <!-- Left window thumbnail (background, slightly smaller) -->
  <rect x="0.75" y="7.5" width="5.5" height="5.5" rx="1.2"
        fill="none" stroke="black" stroke-width="1.1"
        opacity="0.55"/>

  <!-- Right window thumbnail (background, slightly smaller) -->
  <rect x="11.75" y="7.5" width="5.5" height="5.5" rx="1.2"
        fill="none" stroke="black" stroke-width="1.1"
        opacity="0.55"/>

  <!-- Center window thumbnail (foreground, elevated — the "peek") -->
  <rect x="5.25" y="4.5" width="7.5" height="7.5" rx="1.4"
        fill="none" stroke="black" stroke-width="1.3"/>

  <!-- Center window titlebar line (window chrome detail) -->
  <line x1="5.25" y1="6.5" x2="12.75" y2="6.5"
        stroke="black" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Peek indicator: tiny upward arrow from base to center card -->
  <line x1="9" y1="12" x2="9" y2="14.5"
        stroke="black" stroke-width="1" stroke-linecap="round"
        opacity="0.6"/>
</svg>
