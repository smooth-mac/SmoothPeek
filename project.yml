name: SmoothPeek

# ─── Options ─────────────────────────────────────────────────────────────────
options:
  bundleIdPrefix: com.smoothmac
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: false
  # xcconfig 파일로 build settings 분리 방지 — project.yml에서 인라인으로 관리
  settingGroups: {}

# ─── Configs ─────────────────────────────────────────────────────────────────
configs:
  Debug: debug
  Release: release

# ─── Settings (프로젝트 레벨) ─────────────────────────────────────────────────
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    # App Sandbox entitlements
    CODE_SIGN_ENTITLEMENTS: SmoothPeek.entitlements
    DEVELOPMENT_TEAM: ""            # Xcode에서 팀 선택 시 자동 설정
    CODE_SIGN_STYLE: Automatic
  configs:
    Debug:
      # Debug: MAS_BUILD 없음 — Private API + CGWindowList fallback 포함 (Direct 빌드와 동일)
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      # Release: MAS_BUILD 활성화 — App Store 제출용 코드 경로
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: MAS_BUILD

# ─── Targets ─────────────────────────────────────────────────────────────────
targets:
  SmoothPeek:
    type: application
    platform: macOS

    # ── Build Settings ───────────────────────────────────────────────────────
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smoothmac.smoothpeek
        PRODUCT_NAME: SmoothPeek
        EXECUTABLE_NAME: SmoothPeek
        INFOPLIST_FILE: Sources/SmoothPeek/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        # Swift
        SWIFT_VERSION: "5.9"
        # macOS
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        # Hardened Runtime (MAS requirement)
        ENABLE_HARDENED_RUNTIME: YES
        # App Sandbox
        CODE_SIGN_ENTITLEMENTS: SmoothPeek.entitlements
        # Entitlements inherit (필요 시 개별 overrid 가능)
        # Strip
        DEAD_CODE_STRIPPING: YES
        # Swift flags: parse-as-library (SPM과 동일; @main 엔트리포인트 지원)
        OTHER_SWIFT_FLAGS: "-parse-as-library"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          ONLY_ACTIVE_ARCH: YES
          GCC_OPTIMIZATION_LEVEL: "0"
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: MAS_BUILD
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          ONLY_ACTIVE_ARCH: NO
          SWIFT_OPTIMIZATION_LEVEL: "-O"

    # ── Sources ──────────────────────────────────────────────────────────────
    sources:
      # App 레이어
      - path: Sources/SmoothPeek/App
        type: group
      # Core 레이어
      - path: Sources/SmoothPeek/Core
        type: group
      # UI 레이어
      - path: Sources/SmoothPeek/UI
        type: group

    # ── Resources ────────────────────────────────────────────────────────────
    resources:
      - path: Sources/SmoothPeek/Resources/Assets.xcassets

    # ── Info.plist ───────────────────────────────────────────────────────────
    # INFOPLIST_FILE build setting 으로 지정; 별도 plist 항목 불필요

    # ── Entitlements (build setting으로 지정) ────────────────────────────────

    # ── Capabilities ─────────────────────────────────────────────────────────
    # entitlements 파일에 이미 선언됨; Xcode signing & capabilities UI에서
    # App Sandbox / Accessibility / Screen Capture 가 자동 반영된다.

# ─── Schemes ─────────────────────────────────────────────────────────────────
schemes:
  SmoothPeek:
    build:
      targets:
        SmoothPeek: all
    run:
      config: Debug
      # 메뉴바 앱 — 별도 실행 인자 불필요
      commandLineArguments: {}
      environmentVariables: {}
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
